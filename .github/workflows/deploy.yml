name: Deploy to cPanel

# Runs on every push to the main branch (and can be run manually from the
# Actions tab). Uploads only the changed files to cPanel over secure FTP (FTPS).
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    name: FTP upload to public_html
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server:   ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftp           # plain FTP — cPanel's FTPS handshake was hanging (control-socket timeout)
          port:     21
          timeout:  60000         # give the connection up to 60s before failing
          server-dir: ./   # FTP account admin1@nest.mn is rooted at /home/nestmn/public_html, so "./" = public_html
          local-dir:  ./
          # Files that must NOT be published to the live site.
          # (Most are already untracked via .gitignore; listed again for safety.)
          exclude: |
            **/.git*
            **/.git*/**
            **/.github/**
            **/.claude/**
            **/node_modules/**
            sanity-studio/**
            excel_parser/**
            **/*.ps1
            **/*.py
            **/*.csv
            **/*.md
            *.DOCX
            1.docx.txt
            cleaned_map.txt
            excel_content.txt
            excel_math.txt
            extracted_paths.txt
            index-alt.html
            admin-translations.html
            edit.html
            preview.html
            css/styles-alt.css
            world.svg
            map_new.svg
            countries.geo.json
            test.js
            package.json
            package-lock.json
            _headers
            vercel.json
