name: Deploy to cPanel

# Runs on every push to main (and can be run manually from the Actions tab).
# Deploys over SSH with rsync — only changed files are sent. Port 21 (FTP) is
# firewalled by the host, so we use SSH/SFTP (port 22), which is open.
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    name: rsync over SSH to public_html
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy via SSH (rsync)
        uses: easingthemes/ssh-deploy@v5.1.0
        with:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          REMOTE_HOST: "202.131.237.181"     # cPanel server IP (domain is behind Cloudflare)
          REMOTE_USER: "nestmn"              # main cPanel username
          REMOTE_PORT: "2222"   # host firewalls 22; cPanel SSH commonly runs on 2222
          SOURCE: "./"
          TARGET: "/home/nestmn/public_html/"
          ARGS: "-rltgoDzvO"                 # archive-ish; no --delete, so nothing on the server is removed
          EXCLUDE: "/.git/, /.github/, /.claude/, /node_modules/, /sanity-studio/, *.md, /_headers, /vercel.json, /package.json, /package-lock.json, /.gitignore, /edit.html, /js/index-alt.js, /deploy_key, /deploy_key.pub"
