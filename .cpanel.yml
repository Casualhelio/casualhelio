---
# cPanel Git Version Control deployment.
# When you click "Deploy HEAD Commit" in cPanel, these tasks copy the site's
# published files from the cloned repo into public_html. Dev files (docs,
# sanity-studio, package.json, etc.) are intentionally left out.
deployment:
  tasks:
    - export DEPLOYPATH=/home/nestmn/public_html
    - /bin/mkdir -p "$DEPLOYPATH"
    - /bin/cp -RfT css "$DEPLOYPATH/css"
    - /bin/cp -RfT js "$DEPLOYPATH/js"
    - /bin/cp -RfT assets "$DEPLOYPATH/assets"
    - /bin/cp -f index.html about.html companies.html contact.html investor-relations.html news.html article.html 404.html robots.txt sitemap.xml .htaccess "$DEPLOYPATH/"
